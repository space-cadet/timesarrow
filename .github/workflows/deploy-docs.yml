name: Deploy TimesArrow Docs

on:
  push:
    branches:
      - main
    paths:
      - 'numerics/docs/**'
      - 'theory/pages/**'
      - 'theory/docs/**'
      - 'space-cadet.github.io/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'github_pages'
        type: choice
        options:
          - github_pages
          - custom_domain_ssh

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Numerics Docs
        run: |
          cd numerics/docs
          quarto render

      - name: Assemble Site Structure
        run: |
          # Create the deployment structure
          mkdir -p _deploy
          
          # Copy numerics docs into numerics/ subfolder
          mkdir -p _deploy/numerics
          cp -r numerics/docs/_site/* _deploy/numerics/ || true
          
          # Copy theory dashboard into theory/ subfolder
          mkdir -p _deploy/theory
          cp theory/pages/dashboard.html _deploy/theory/index.html
          cp -r theory/docs/* _deploy/theory/docs/ || true
          
          # Create root index page
          cat > _deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>TimesArrow Project</title>
            <meta charset="utf-8">
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
              h1 { border-bottom: 2px solid #0d6efd; padding-bottom: 0.5rem; }
              .card { border: 1px solid #dee2e6; border-radius: 0.5rem; padding: 1.5rem; margin: 1rem 0; }
              .card h2 { margin-top: 0; }
              a { color: #0d6efd; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .tag { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.85rem; background: #e7f1ff; margin-right: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>⚛️ TimesArrow Project</h1>
            <p>Gauging Time Reversal Symmetry in Quantum Gravity: Arrow of Time from a Confinement–Deconfinement Transition</p>
            
            <div class="card">
              <h2>📊 Numerics Portal</h2>
              <p>Simulation dashboards, data registry, and analysis for Monte Carlo, tensor network, and exact diagonalization runs.</p>
              <p><a href="numerics/">→ Enter Numerics Portal</a></p>
              <span class="tag">Dashboard</span>
              <span class="tag">Data Registry</span>
              <span class="tag">Quarto Docs</span>
            </div>
            
            <div class="card">
              <h2>🧮 Theory Portal</h2>
              <p>Analytical constructions, symmetry analysis, and theoretical frameworks for CZX, intertwiners, and quantum geometry.</p>
              <p><a href="theory/">→ Enter Theory Portal</a></p>
              <span class="tag">Symmetry Analysis</span>
              <span class="tag">CZX SPT</span>
              <span class="tag">Intertwiners</span>
            </div>
            
            <p style="margin-top: 2rem; color: #6c757d; font-size: 0.9rem;">
              <a href="https://github.com/space-cadet/timesarrow">GitHub Repo</a> | 
              <a href="https://github.com/space-cadet/ts-quantum">ts-quantum Library</a> | 
              <a href="https://arxiv.org/abs/XXXX.XXXXX">Paper (arXiv)</a>
            </p>
          </body>
          </html>
          EOF

      # Deploy to GitHub Pages (default)
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && (github.event.inputs.target == 'github_pages' || github.event.inputs.target == '')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          # Custom domain setup: uncomment and set your domain
          # cname: quantumofgravity.com

      # Deploy to custom domain via SSH (requires SSH_KEY secret)
      - name: Deploy to Custom Domain via SSH
        if: github.event.inputs.target == 'custom_domain_ssh'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add host to known hosts (or use StrictHostKeyChecking=no for first run)
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          
          # Create remote directory if it doesn't exist
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p $REMOTE_PATH"
          
          # Deploy via rsync
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            ./_deploy/ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"
          
          echo "Deployed to $SSH_HOST:$REMOTE_PATH"
